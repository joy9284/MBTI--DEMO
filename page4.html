<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="main.js"></script>
<title>Q4</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f4e4ea;
}

/* ⭐ 全頁結構 */
.container{
  width:100%;
  max-width:420px;
  margin:auto;

  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;

  padding:40px 20px;
  box-sizing:border-box;
  text-align:center;
}

/* ⭐ 圖片區：置中 + 放大 */
.img-box{
  flex:1; /* ⭐ 吃掉上半部空間，讓圖片自然置中 */
  display:flex;
  justify-content:center;
  align-items:center;
}

.img-box img{
  width:100%;
  max-width:320px; /* ⭐ 放大重點 */
  height:auto;
}

/* ⭐ 按鈕區：往下 1/3 */
.button-area{
  width:100%;
  margin-top:auto; /* ⭐ 推到底部 */
  padding-bottom:80px; /* ⭐ 不要貼邊 */
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* 按鈕 */
button{
  width:100%;
  padding:16px 14px;
  margin:10px 0;

  border:none;
  border-radius:20px;
  background:#fff;

  /* ⭐ 重點 */
  font-size:18px;        /* 變大 */
  color:#6f5544;         /* 字色 */
  letter-spacing:1.5px;   /* 字距加寬 */

  appearance:none;
  -webkit-appearance:none;

  text-decoration:none;
}

/* 手機微調 */
@media (max-width:480px){

  .img-box img{
    max-width:260px;
  }

  button{
    font-size:14px;
    padding:12px;
  }
}
</style>
</head>

<body>

<div class="container">
  
  <div class="img-box">
    <img src="images/7.png" alt="page1_girl" class="girl">
  </div>
  
  <button onclick="choose('J','answerpage.html')">固定流程</button>
  <button onclick="choose('P','answerpage.html')">看心情</button>
</div>

</body>
</html>
