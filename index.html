<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化妝MBTI測驗</title>

<style>
body{
  margin:0;
  font-family:"微軟正黑體";
  background:#d8c9cc;
}

/* 外層置中 */
.wrapper{
  display:flex;
  justify-content:center;
}

/* 主內容區（白邊效果） */
.container{
  width:100%;
  max-width:420px;
  min-height:100vh;

  text-align:center;
  padding:40px 20px;
  box-sizing:border-box;
}

/* 標題膠囊 */
.title-box{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:#eee;
  padding:12px 20px;
  border-radius:30px;
  font-size:22px;
  color:#6d5f5f;
}

/* 內文 */
.desc{
  margin-top:120px;
  font-size:20px;
  line-height:2;
  color:#6d5f5f;
}

/* 按鈕 */
.start-btn{
  margin-top:120px;
  padding:12px 30px;
  border:none;
  border-radius:20px;
  font-size:18px;
  background:#eee;
  color:#6d5f5f;
  cursor:pointer;
}

/* 手機優化 */
@media (max-width:480px){
  .desc{
    font-size:16px;
    margin-top:80px;
  }

  .start-btn{
    margin-top:80px;
  }
}
</style>

</head>

<body>

<div class="wrapper">
  <div class="container">

    <div class="title-box">
      💄 化妝MBTI測驗

    <div class="desc">
      嘿你知道嗎，MBTI其實會隨情境轉換<br>

      有些時候P人會用J人的方式思考<br><br>
      一起來看看妳化妝時的MBTI是什麼吧
    </div>

    <button class="start-btn" onclick="start()">
      開始 →
    </button>

  </div>
</div>

<script>
function start(){
  localStorage.setItem("result", JSON.stringify([]));
  location.href = "page1.html";
}
</script>

</html>
