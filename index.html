<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>化妝MBTI測驗</title>

<style>
body{
  margin:0;
  font-family:"微軟正黑體";
  background:#d9c6cb;
  text-align:center;
}

/* 共用 */
.page{
  display:none;
  padding:40px 20px;
}
.active{
  display:block;
}

/* 按鈕 */
.btn{
  background:#eee;
  border:none;
  padding:12px 30px;
  border-radius:20px;
  font-size:18px;
  cursor:pointer;
}

/* ===== 首頁 ===== */
.title-box{
  background:#eee;
  display:inline-block;
  padding:15px 30px;
  border-radius:30px;
  font-size:28px;
  margin-bottom:40px;
}
.desc{
  line-height:1.8;
  font-size:18px;
  color:#6b5b5b;
  margin-bottom:40px;
}

/* ===== 測驗 ===== */
.question{
  font-size:22px;
  margin-bottom:30px;
}
.option{
  display:block;
  margin:15px auto;
  width:80%;
  padding:15px;
  border-radius:20px;
  background:#eee;
  border:none;
  font-size:18px;
}

/* ===== 結果 ===== */
.card{
  background:#eee;
  border-radius:20px;
  padding:10px 20px;
  display:inline-block;
  margin-bottom:20px;
  font-size:24px;
}

.model-img{
  width:220px;
  border-radius:10px;
}

.text{
  max-width:400px;
  margin:20px auto;
  line-height:1.8;
  color:#6b5b5b;
}

.product-box{
  border:2px solid #333;
  padding:10px;
  margin-top:20px;
}

.products{
  display:flex;
  justify-content:space-around;
}

.products img{
  width:70px;
}

.buy{
  margin-top:30px;
  font-size:24px;
}
</style>

</head>

<body>

<!-- ===== 頁面1：前言 ===== -->
<div id="page1" class="page active">

  <div class="title-box">💄 化妝MBTI測驗</div>

  <div class="desc">
    嘿你知道嗎，MBTI其實會隨情境轉換<br>
    有些人在工作時會用E人的方式去交際<br>
    有些時候P人會用J人的方式思考<br>
    一起來看看妳化妝時的MBTI是什麼吧
  </div>

  <button class="btn" onclick="startQuiz()">開始 →</button>

</div>


<!-- ===== 頁面2：測驗 ===== -->
<div id="page2" class="page">

  <div class="question" id="question"></div>

  <button class="option" onclick="answer('A')" id="optA"></button>
  <button class="option" onclick="answer('B')" id="optB"></button>

</div>


<!-- ===== 頁面3：結果 ===== -->
<div id="page3" class="page">

  <div class="card" id="mbtiTitle"></div>

  <img id="modelImg" class="model-img">

  <div class="card" id="makeup"></div>

  <div class="text" id="desc"></div>

  <div class="product-box">
    <div>🔍 命定化妝品</div>
    <div class="products" id="products"></div>
  </div>

  <div class="buy">去購買 →</div>

</div>


<script>

// ===== 題目 =====
const questions = [
  {q:"你化完妝最在意的是？", A:"別人有沒有發現", B:"自己看起來舒服", type:["E","I"]},
  {q:"你覺得好看的妝是？", A:"乾淨無瑕", B:"有氛圍感", type:["S","N"]},
  {q:"選化妝品你會？", A:"看成分評價", B:"看感覺", type:["T","F"]},
  {q:"你的化妝習慣？", A:"固定流程", B:"看心情", type:["J","P"]}
];

let current = 0;
let result = [];

// ===== 資料（先示範INFP，你可補16型）=====
const data = {
"INFP":{
  title:"🌷 INFP 人間仙女",
  makeup:"溫柔氛圍妝",
  desc:"你屬於內斂又感受力很強的人，不喜歡過於張揚的風格，低飽和粉調讓你自然散發溫柔氣質。",
  model:"images/models/INFP.jpg",
  products:[
    {img:"images/products/小蜜乳.png"},
    {img:"images/products/小奶朵.png"},
    {img:"images/products/小金桃.png"}
  ]
}
};

// ===== 開始 =====
function startQuiz(){
  document.getElementById("page1").classList.remove("active");
  document.getElementById("page2").classList.add("active");
  showQuestion();
}

// ===== 顯示題目 =====
function showQuestion(){
  let q = questions[current];
  document.getElementById("question").innerText = q.q;
  document.getElementById("optA").innerText = "A：" + q.A;
  document.getElementById("optB").innerText = "B：" + q.B;
}

// ===== 回答 =====
function answer(choice){
  let q = questions[current];
  result.push(choice==="A"?q.type[0]:q.type[1]);
  current++;

  if(current < questions.length){
    showQuestion();
  } else {
    showResult();
  }
}

// ===== 結果 =====
function showResult(){
  document.getElementById("page2").classList.remove("active");
  document.getElementById("page3").classList.add("active");

  let mbti = result.join("");
  let info = data[mbti];

  // 防呆
  if(!info){
    info = data["INFP"];
  }

  document.getElementById("mbtiTitle").innerText = info.title;
  document.getElementById("makeup").innerText = info.makeup;
  document.getElementById("desc").innerText = info.desc;
  document.getElementById("modelImg").src = info.model;

  let productHTML = "";
  info.products.forEach(p=>{
    productHTML += `<img src="${p.img}">`;
  });

  document.getElementById("products").innerHTML = productHTML;
}

</script>

</body>
</html>
