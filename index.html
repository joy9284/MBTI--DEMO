<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化妝MBTI測驗</title>

<style>
body{
  margin:0;
  font-family:"微軟正黑體";
  background:#f4e4ea;
}

/* 全頁置中 */
.container{
  width:100%;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
  box-sizing:border-box;
  gap:30px;
}

/* 標題 */
.title-box{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:#FFFFFF;
  padding:12px 20px;
  border-radius:30px;
  font-size:22px;
  color:#6d5f5f;

  opacity:0;
  transform:translateY(10px);
  animation:fadeTitle 1.2s ease forwards;
}

.title-box img{
  height:20px;
  transform:translateY(1px);
}

@keyframes fadeTitle{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* 文字區 */
.text-box{
  display:flex;
  flex-direction:column;
  gap:24px;
}

/* ⭐ 關鍵：先全部隱藏 */
.line{
  font-size:18px;
  line-height:2;
  color:#6d5f5f;

  opacity:0;
}

/* ⭐ 用「分開動畫」避免亂序 */
.l1{
  animation:fadeUp 1.8s ease forwards;
  animation-delay:0.4s;
}

.l2{
  animation:fadeUp 1.8s ease forwards;
  animation-delay:1.6s;
}

.l3{
  animation:fadeUp 1.8s ease forwards;
  animation-delay:2.8s;
}

.l4{
  animation:fadeUp 1.8s ease forwards;
  animation-delay:4.0s;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(25px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* 按鈕 */
.start-btn{
  padding:12px 30px;
  border:none;
  border-radius:20px;
  font-size:18px;
  background:#FFFFFF;
  color:#6d5f5f;
}
</style>
</head>

<body>

<div class="container">

  <div class="title-box">
    <img src="images/標題小口紅.png">
    化妝MBTI測驗
  </div>

  <div class="text-box">
    <div class="line l1">嘿你知道嗎，MBTI其實會隨情境轉換</div>
    <div class="line l2">有些I人在工作時會用E人的方式去交際</div>
    <div class="line l3">有些時候P人會用J人的方式思考</div>
    <div class="line l4">一起來看看妳化妝時的MBTI是什麼吧</div>
  </div>

  <button class="start-btn" onclick="start()">
    開始 →
  </button>

</div>

<script>
function start(){
  localStorage.setItem("result", JSON.stringify([]));
  location.href = "page1.html";
}
</script>

</body>
</html>
