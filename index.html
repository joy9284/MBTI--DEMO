<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化妝MBTI測驗</title>

<style>
body{
  margin:0;
  font-family:"微軟正黑體";
  background:#d9c6cb;
  text-align:center;
}

.page{
  display:none;
  padding:30px 16px;
}
.active{
  display:block;
}

.btn{
  background:#eee;
  border:none;
  padding:12px 30px;
  border-radius:20px;
  font-size:16px;
}

/* 首頁 */
.title-box{
  background:#eee;
  padding:12px 24px;
  border-radius:30px;
  font-size:22px;
}
.desc{
  font-size:15px;
  line-height:1.6;
  margin:30px 0;
}

/* 題目 */
.question{
  font-size:20px;
  margin-bottom:20px;
}
.option{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:20px;
  font-size:16px;
  border:none;
  background:#eee;
}

/* 結果 */
.card{
  background:#eee;
  border-radius:20px;
  padding:8px 16px;
  font-size:20px;
  margin:10px 0;
}

.model-img{
  width:100%;
  max-width:260px;
  border-radius:12px;
  margin:10px 0;
}

.text{
  font-size:14px;
  line-height:1.6;
  margin:15px 0;
}

/* 產品 */
.product-box{
  border:2px solid #333;
  padding:15px;
  margin-top:20px;
}

.products{
  display:flex;
  justify-content:space-around;
  gap:10px;
}

.product-item{
  width:30%;
}

.product-item img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:8px;
}

.product-name{
  font-size:12px;
  margin-top:5px;
}

/* 購買 */
.buy{
  display:inline-block;
  margin-top:25px;
  font-size:18px;
  color:white;
  background:#ff6b81;
  padding:12px 24px;
  border-radius:25px;
  text-decoration:none;
}
</style>

</head>

<body>

<!-- 首頁 -->
<div id="page1" class="page active">
  <div class="title-box">💄 化妝MBTI測驗</div>

  <div class="desc">
    嘿你知道嗎，MBTI其實會隨情境轉換<br>
    一起來看看妳化妝時的MBTI是什麼吧
  </div>

  <button class="btn" onclick="startQuiz()">開始 →</button>
</div>

<!-- 測驗 -->
<div id="page2" class="page">
  <div class="question" id="question"></div>
  <button class="option" onclick="answer('A')" id="optA"></button>
  <button class="option" onclick="answer('B')" id="optB"></button>
</div>

<!-- 結果 -->
<div id="page3" class="page">

  <div class="card" id="mbtiTitle"></div>

  <img id="modelImg" class="model-img">

  <div class="card" id="makeup"></div>

  <div class="text" id="desc"></div>

  <div class="product-box">
    <div>🔍 命定化妝品</div>
    <div class="products" id="products"></div>
  </div>

  <a href="https://www.amfairyland.com/products" target="_blank" class="buy">
    入手同款妝容 →
  </a>

</div>

<script>

// 題目
const questions = [
  {q:"你化完妝最在意的是？", A:"別人有沒有發現", B:"自己看起來舒服", type:["E","I"]},
  {q:"你覺得好看的妝是？", A:"乾淨無瑕", B:"有氛圍感", type:["S","N"]},
  {q:"選化妝品你會？", A:"看成分評價", B:"看感覺", type:["T","F"]},
  {q:"你的化妝習慣？", A:"固定流程", B:"看心情", type:["J","P"]}
];

let current = 0;
let result = [];

// 資料（示範）
const data = {
"INFP":{
  title:"🌷 INFP 人間仙女",
  makeup:"溫柔氛圍妝",
  desc:"你屬於內斂又感受力很強的人，低飽和粉調讓你自然散發溫柔氣質。",
  model:"images/models/INFP.jpg",
  products:[
    {img:"images/products/小蜜乳.png"},
    {img:"images/products/小奶朵.png"},
    {img:"images/products/小金桃.png"}
  ]
}
};

// 開始
function startQuiz(){
  document.getElementById("page1").classList.remove("active");
  document.getElementById("page2").classList.add("active");
  showQuestion();
}

// 顯示題目
function showQuestion(){
  let q = questions[current];
  document.getElementById("question").innerText = q.q;
  document.getElementById("optA").innerText = "A：" + q.A;
  document.getElementById("optB").innerText = "B：" + q.B;
}

// 回答
function answer(choice){
  let q = questions[current];
  result.push(choice==="A"?q.type[0]:q.type[1]);
  current++;

  if(current < questions.length){
    showQuestion();
  } else {
    showResult();
  }
}

// 顯示結果
function showResult(){
  document.getElementById("page2").classList.remove("active");
  document.getElementById("page3").classList.add("active");

  let mbti = result.join("");
  let info = data[mbti] || data["INFP"];

  document.getElementById("mbtiTitle").innerHTML = info.title.replace(" ", "<br>");
  document.getElementById("makeup").innerHTML = "推薦妝容<br>" + info.makeup;
  document.getElementById("desc").innerText = info.desc;
  document.getElementById("modelImg").src = info.model;

  let productHTML = "";
  info.products.forEach(p=>{
    let name = p.img.split("/").pop().split(".")[0];

    productHTML += `
      <div class="product-item">
        <a href="https://www.amfairyland.com/products" target="_blank">
          <img src="${p.img}">
        </a>
        <div class="product-name">${name}</div>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = productHTML;
}

</script>

</body>
</html>
