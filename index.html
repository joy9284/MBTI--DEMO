<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化妝MBTI測驗</title>

<style>
body{
  margin:0;
  font-family:"微軟正黑體";
  background:#f4e4ea;
}

/* ⭐ 全頁置中 */
.container{
  width:100%;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center; /* ⭐ 上下置中關鍵 */
  text-align:center;
  padding:40px 20px;
  box-sizing:border-box;
  gap:30px; /* ⭐ 控制整體間距 */
}

/* 標題 */
.title-box{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:#FFFFFF;
  padding:12px 20px;
  border-radius:30px;
  font-size:22px;
  color:#6d5f5f;

  opacity:0;
  transform:translateY(10px);
  animation:fadeTitle 1.2s ease forwards;
}

.title-box img{
  height:20px;
  transform:translateY(1px);
}

@keyframes fadeTitle{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ⭐ 文字區塊（拉開跟標題距離） */
.text-box{
  display:flex;
  flex-direction:column;
  gap:24px; /* ⭐ 每行間距 */
}

/* 逐行動畫 */
.line{
  font-size:18px;
  line-height:2;
  color:#6d5f5f;

  opacity:0;
  transform:translateY(25px);

  animation:fadeUp 1.8s ease forwards;
}

/* ⭐ 延遲（可以再慢一點） */
.l1{ animation-delay:0.6s; }
.l2{ animation-delay:2.s; }
.l3{ animation-delay:3.4s; }
.l4{ animation-delay:5.0s; }

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* 按鈕 */
.start-btn{
  padding:12px 30px;
  border:none;
  border-radius:20px;
  font-size:18px;
  background:#FFFFFF;
  color:#6d5f5f;
}
</style>
</head>

<body>

<div class="container">

  <div class="title-box">
    <img src="images/標題小口紅.png">
    化妝MBTI測驗
  </div>

  <div class="text-box">
    <div class="line l1">嘿你知道嗎，MBTI其實會隨情境轉換</div>
    <div class="line l2">有些I人在工作時會用E人的方式去交際</div>
    <div class="line l3">有些時候P人會用J人的方式思考</div>
    <div class="line l4">一起來看看妳化妝時的MBTI是什麼吧</div>
  </div>

  <button class="start-btn" onclick="start()">
    開始 →
  </button>

</div>

<script>
function start(){
  localStorage.setItem("result", JSON.stringify([]));
  location.href = "page1.html";
}
</script>

</body>
</html>
