
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFP 人間仙女</title>
    <style>
        /* 整體背景與字體設定 */
        body {
            margin: 0;
            padding: 20px 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f4e4ea; /* 圖片的粉色底 */
            display: flex;
            justify-content: center;
        }

        /* 主容器：RWD 關鍵 */
        .container {
            width: 90%;
            max-width: 400px; /* 電腦版不會太寬，手機版會適應螢幕 */
            text-align: center;
            color: #6d5b5b;
        }

        /* 標題塊 */
        .title-box {
            display: inline-block;
            background: #fff;
            padding: 10px 40px;
            border-radius: 15px;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 黑色邊框區域 (模特兒與產品區) */
        .border-box {
            border: 2px solid #000;
            background: #fff;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .label-header {
            padding: 8px;
            font-size: 14px;
            border-bottom: 2px solid #000;
            background: #fff;
        }

        /* 模特兒圖片 */
        .model-img {
            width: 100%;
            display: block;
        }

        .makeup-name {
            padding: 10px;
            border-top: 2px solid #000;
            font-size: 16px;
        }

        /* 描述文字區 */
        .description {
            font-size: 15px;
            line-height: 1.8;
            margin: 30px 0;
            padding: 0 10px;
            text-align: justify;
        }

        /* 產品三欄佈局 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 強制三列 */
        }

        .product-item {
            padding: 15px 5px;
            border-right: 1px solid #eee;
        }

        .product-item:last-child {
            border-right: none;
        }

        .product-item img {
            width: 80%;
            height: auto;
            margin-bottom: 8px;
        }

        .product-item p {
            margin: 0;
            font-size: 13px;
        }

        /* 下方按鈕 */
        .buy-link {
            display: block;
            margin-top: 30px;
            text-decoration: none;
            color: #6d5b5b;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-box">INFP人間仙女</div>

    <div class="border-box">
        <div class="label-header">🔍 推薦妝容</div>
        <img src="https://via.placeholder.com/400x500/f8f0f0/6d5b5b?text=Model+Image" class="model-img">
        <div class="makeup-name">溫柔氛圍妝</div>
    </div>

    <div class="description">
        你屬於比較內斂、感受力很強的人，情緒細膩、容易被氛圍影響。不喜歡太強烈或太張揚的風格，比起吸引所有人，你更在意「剛剛好被看見」。
    </div>

    <div class="border-box">
        <div class="label-header">🔍 命中化妝品</div>
        <div class="product-grid">
            <div class="product-item">
                <img src="https://via.placeholder.com/80x120/fff/6d5b5b?text=Product" alt="小蜜乳">
                <p>小蜜乳</p>
            </div>
            <div class="product-item">
                <img src="https://via.placeholder.com/80x120/fff/6d5b5b?text=Product" alt="小奶朵">
                <p>小奶朵</p>
            </div>
            <div class="product-item">
                <img src="https://via.placeholder.com/80x120/fff/6d5b5b?text=Product" alt="小金桃">
                <p>小金桃</p>
            </div>
        </div>
    </div>

    <a href="#" class="buy-link">去購買 ➔</a>
</div>

</body>
</html>
