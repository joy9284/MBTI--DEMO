<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="main.js"></script>
<title>answerpage</title>

<style>
body {
    margin: 0;
    padding: 20px 0;
    font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
    background-color: #f4e4ea;
    display: flex;
    justify-content: center;
}

.container {
    width: 90%;
    max-width: 420px;
    text-align: center;
    color: #6d5b5b;
}

/* 標題 */
.title-box {
    display: inline-block;
    background: #fff;
    padding: 12px 36px;
    border-radius: 20px;
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 30px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.06);
}

/* 模特兒 */
.model-img {
    width: 85%;
    display: block;
    margin: 0 auto 25px;
}

/* 文字 */
.description {
    font-size: 15px;
    line-height: 1.8;
    margin: 20px 0;
    padding: 0 10px;
}

/* ⭐ 重點：產品圖 */
.makeup-name {
    width: 100%;
    max-width: 340px;   /* ⭐ 放大關鍵 */
    margin: 20px auto;
    display: block;

    border-radius: 16px;   /* ⭐ 質感 */
    box-shadow: 0 8px 20px rgba(0,0,0,0.08); /* ⭐ 浮起來 */
}

/* 按鈕 */
.buy-link {
    display: block;
    margin-top: 30px;
    text-decoration: none;
    color: #6d5b5b;
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="title-box" id="title"></div>

    <img id="model" class="model-img">
    
    <div class="description" id="desc"></div>
    
    <img id="makeup" class="makeup-name">

    <a href="https://www.amfairyland.com/products" class="buy-link">
        去購買 ➔
    </a>

</div>

<script>
renderResult();
</script>

</body>
</html>
