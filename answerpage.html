
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="main.js"></script>
    <title>answerpage</title>
    <style>
        /* 整體背景與字體設定 */
        body {
            margin: 0;
            padding: 20px 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f4e4ea; /* 圖片的粉色底 */
            display: flex;
            justify-content: center;
        }

        /* 主容器：RWD 關鍵 */
        .container {
            width: 90%;
            max-width: 400px; /* 電腦版不會太寬，手機版會適應螢幕 */
            text-align: center;
            color: #6d5b5b;
        }

        /* 標題塊 */
        .title-box {
            display: inline-block;
            background: #fff;
            padding: 10px 40px;
            border-radius: 15px;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 黑色邊框區域 (模特兒與產品區) */
        .border-box {
            border: 2px solid #000;
            background: #fff;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .label-header {
            padding: 8px;
            font-size: 14px;
            border-bottom: 2px solid #000;
            background: #fff;
        }

        /* 模特兒圖片 */
        .model-img {
            width: 80%;           /* 圖片寬度 */
            display: block;       /* 轉為區塊元素，這是置中的前提 */
            margin: 0 auto 20px;  /* 上 0, 左右自動(置中), 下 20px */
        }

        .makeup-name {
            width: 100%;           /* 圖片寬度 */
            display: block;       /* 轉為區塊元素，這是置中的前提 */
            margin: 0 auto ;  /* 上 0, 左右自動(置中), 下 20px */
        }

/* 描述文字區：縮小下方邊距 */
.description {
    font-size: 15px;
    line-height: 1.8;
    margin: 30px 0 10px 0; /* 修改點：上 30px, 下縮小為 10px */
    padding: 0 10px;
    text-align: center;
}

/* 妝容名稱圖片：移除上方多餘邊距，並可調整寬度 */
.makeup-name {
    width: 60%;           /* 建議不要 100% 避免太大，視圖片比例調整 */
    display: block;
    margin: 0 auto;       /* 修改點：移除下方的 20px，讓它更緊湊 */
}
        /* 產品三欄佈局 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 強制三列 */
        }

        .product-item {
            padding: 15px 5px;
            border-right: 1px solid #eee;
        }

        .product-item:last-child {
            border-right: none;
        }

        .product-item img {
            width: 80%;
            height: auto;
            margin-bottom: 8px;
        }

        .product-item p {
            margin: 0;
            font-size: 13px;
        }

        /* 下方按鈕 */
        .buy-link {
            display: block;
            margin-top: 30px;
            text-decoration: none;
            color: #6d5b5b;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-box" id="title"></div>

    <img id="model" class="model-img">
    
    <div class="description" id="desc"></div>
    
    <img id="makeup" class="makeup-name">


    <a href="https://www.amfairyland.com/products" class="buy-link">去購買 ➔</a>
</div>
<script>
renderResult();
</script>
</body>
</html>
